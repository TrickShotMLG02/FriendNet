# GUI Titles
locale:
  texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZmNiYzMyY2IyNGQ1N2ZjZGMwMzFlODUxMjM1ZGEyZGFhZDNlMTkxNGI4NzA0M2JkMDEyNjMzZTZmMzJjNyJ9fX0="

format:
  timestamp: "MM/dd/yyyy hh:mm a"

titles:
  friendsGUI: "Your Friends"
  friendRequestsGUI: "Friend Requests"
  friendSettingsGUI: "%target%'s Settings"
  personalSettingsGUI: "Your Settings"
  localeSelectionGUI: "Change your Language"
  blocklistGUI: "Blocked Players"
  favoriteFriendsGUI: "Favorite Friends"
  friendFilterGUI: "Friend Filters"
  friendNameSearchGUI: "Search Friends"
  friendDetailGUI: "%target%"

# Buttons / Items
buttons:
  toggle:
    active:
      displayName: "&aOn"
      lore:
        - "&7Click to toggle"
    inactive:
      displayName: "&4Off"
      lore:
        - "&7Click to toggle"
  selector:
    active:
      displayName: "&aSelected"
      lore:
        - "&7This option is already selected"
    inactive:
      displayName: "&4Not Selected"
      lore:
        - "&7Click to select"
  close:
    displayName: "&cClose"
    lore:
      - "&7Click to close this menu"
  back:
    displayName: "&eBack"
    lore:
      - "&7Go back to the previous menu"
  favourite:
    displayName: "&aFavourite"
    lore:
      - "&7Toggle this friend as a favourite"
  removeFriend:
    displayName: "&cRemove Friend"
    lore:
      - "&7Remove this player from your friends list"
  acceptRequest:
    displayName: "&aAccept"
    lore:
      - "&7Click to accept the friend request"
  denyRequest:
    displayName: "&cDeny"
    lore:
      - "&7Click to deny the friend request"

# Friend List GUI
friendsGUI:
  buttons:
    requests:
      displayName: "&ePending Requests"
      lore:
        - "&7Click to view your pending requests"
    personalSettings:
      displayName: "&eSettings"
      lore:
        - "&7Click to change your settings"
    blocklist:
      displayName: "&eBlocked Players"
      lore:
        - "&7Click to view your blocked players"
    filter:
      displayName: "&eFilter"
      lore:
        - "&7Click to filter your friends"
    favorites:
      displayName: "&eFavorites"
      lore:
        - "&7Click to view your favorite friends"

  emptyListMessage: "&cYou have no friends yet!"
  playerSummary:
    statistics: "&7Statistics:"
    totalFriends: "&7Total Friends: &e%count%"
    totalRequests: "&7Total Requests: &e%count%"

# Friend Entry Lore
friendEntries:
  lore:
    status: "&7Status: %status%"
    favourite: "&7Favourite: %value%"
    friendsSince: "&7Friends since: %date%"
    lastSeen: "&7Last seen: %date%"
  status:
    online: "&aOnline"
    offline: "&cOffline"
  boolean:
    "yes": "&aYes"
    "no": "&cNo"
  lastSeen:
    now: "&aNow"
    unknown: "&8Unknown"

# Friend Requests GUI
friendRequestsGUI:
  emptyListMessage: "&cNo pending friend requests"
  buttons:
    acceptAllRequests:
      displayName: "&aAccept all"
      lore:
        - "&7Click to accept all friend requests"
    denyAllRequests:
      displayName: "&cDeny all"
      lore:
        - "&7Click to deny all friend requests"

# Blocklist GUI
blocklistGUI:
  buttons:
    blockedPlayers:
      displayName: "&eBlocked Players"
      lore:
        - "&7Players you have blocked will appear here."
    addBlockedPlayer:
      displayName: "&aAdd Blocked Player"
      lore:
        - "&7Placeholder for selecting a player to block."
    clearBlocklist:
      displayName: "&cClear Blocklist"
      lore:
        - "&7Placeholder for removing all blocked players."

# Favorite Friends GUI
favoriteFriendsGUI:
  buttons:
    sortFavorites:
      displayName: "&eSort Favorites"
      lore:
        - "&7Placeholder for changing the favorite sort order."

# Friend Filter GUI
friendFilterGUI:
  buttons:
    favoritesOnly:
      displayName: "&eFavorites Only"
      lore:
        - "&7Show only favorite friends."
    onlineOnly:
      displayName: "&eOnline Only"
      lore:
        - "&7Show only friends who are online."
    nameSearch:
      displayName: "&eName Search"
      lore:
        - "&7Filter friends by a fuzzy name search."
      search:
        displayName: "&eSearch"
      active:
        displayName: "&a%query%"
      current: "&7Current: &e%query%"
    recentlySeen:
      displayName: "&eRecently Seen"
      lore:
        - "&7Prioritize friends seen recently."
    sortDirection:
      displayName: "&eSort Direction"
      lore:
        - "&7Choose whether older or newer entries appear first."
      ascending:
        displayName: "&aAscending"
        lore:
          - "&7Oldest entries first."
          - "&7Click to switch to descending."
      descending:
        displayName: "&aDescending"
        lore:
          - "&7Newest entries first."
          - "&7Click to switch to ascending."
    reset:
      displayName: "&cReset Filters"
      lore:
        - "&7Clear all selected filters."
    apply:
      displayName: "&aApply Filters"
      lore:
        - "&7Apply the selected filters."

# Friend Name Search GUI
friendNameSearchGUI:
  prompt: "&eType the friend search term in chat. Type &ccancel&e to cancel."
  cancelKeyword: "cancel"

# Friend Settings GUI
friendSettingsGUI:
  toggleFavourite:
    on: "&aThis friend is now a favourite"
    off: "&cThis friend is no longer a favourite"
  removeFriend:
    confirm: "&cAre you sure you want to remove &e%target%&c?"
    success: "&e%target% &bwas removed from your friends"
    fail: "&cFailed to remove &e%target%"

# Friend Detail GUI
friendDetailGUI:
  buttons:
    favourite:
      add:
        displayName: "&aAdd Favourite"
        lore:
          - "&7Mark this friend as a favourite."
      remove:
        displayName: "&cRemove Favourite"
        lore:
          - "&7Remove this friend from your favourites."
    message:
      displayName: "&eSend Message"
      lore:
        - "&7Prepare a private message command."
    removeFriend:
      displayName: "&cRemove Friend"
      lore:
        - "&7Remove this player from your friends list."
  message:
    prompt: "&eClick here to message &a%target%"
    hover: "&7Suggest command: &e%command%"

# Personal Settings GUI
personalSettingsGUI:
  buttons:
    toggleAllowRequests:
      displayName: "&eAllow Friend Requests"
      lore:
        - "&7Toggle to allow or block incoming friend requests."
    toggleShowOnlineStatus:
      displayName: "&eShow Online Status"
      lore:
        - "&7Toggle whether your online status is visible to friends."
    toggleAutoAcceptRequests:
      displayName: "&eAuto-Accept Friend Requests"
      lore:
        - "&7Automatically accept incoming friend requests."
    toggleRequestNotifications:
      displayName: "&eFriend Request Notifications"
      lore:
        - "&7Receive notifications for incoming friend requests."
    togglePublicFriendList:
      displayName: "&ePublic Friend List"
      lore:
        - "&7Allow others to see your friend list."
    setLanguage:
      displayName: "&eSet Language"
      lore:
        - "&7Choose your preferred language."
    openLanguageMenu:
      displayName: "&aOpen Language Menu"
      lore:
        - "&7Click to choose your preferred language."


# Pagination buttons (for all GUIs)
pagination:
  nextPage:
    displayName: "&aNext Page"
    lore:
      - "&7Go to the next page"
  previousPage:
    displayName: "&aPrevious Page"
    lore:
      - "&7Go to the previous page"
  pageIndicator:
    displayName: "&7Page %current%/%max%"

# Mode for the Spigot adapter.
# Standalone: this backend owns DB state, commands, join/quit, and notifications.
# Proxy: this backend delegates persistent FriendNet state to the proxy and acts as a GUI/client adapter.
Mode: Standalone

# Shared secret for Spigot <-> proxy plugin messaging in Proxy mode.
# Set the same value on the Velocity adapter. Change this before using proxy mode.
ConnectionToken: change-me

# The backend to use: SQLite, MySQL, MariaDB (case-insensitive)
DatabaseType: SQLite

# Interval for coalesced standalone player-data writes.
# In Proxy mode, the proxy should be the authoritative writer instead.
PlayerDataFlushIntervalSeconds: 30

# Enables verbose FriendNet debug logging.
Debug: false

# Locale files that FriendNet should load from the Locales directory.
SupportedLocales:
  - en_US
  - de
  - gsw_CH

# Locale used for console messages and players without a stored locale.
DefaultLocale: "en_US"

# The settings for MySQL/MariaDB Connection
MySQL:
  host: localhost:3306
  dbName: friendnet
  username: friendnet
  password: friendnet
  useSSL: false
  allowPublicKeyRetrieval: false

# The settings for SQLite Connection
SQLite:
  dbName: friendnet

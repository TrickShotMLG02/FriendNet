# Mode for the plugin: Proxy, Standalone
Mode: Standalone

# The backend to use: SQLite, MySQL, MariaDB (case-insensitive)
DatabaseType: SQLite

# Interval for coalesced standalone player-data writes.
# In Proxy mode, the proxy should be the authoritative writer instead.
PlayerDataFlushIntervalSeconds: 30

SupportedLocales:
  - en_US
  - de

DefaultLocale: "en_US"

# The settings for MySQL/MariaDB Connection
MySQL:
  host: localhost:3306
  dbName: friendnet
  username: friendnet
  password: friendnet

# The settings for SQLite Connection
SQLite:
  dbName: friendnet

# Mode for the Spigot adapter.
# Standalone: this backend owns DB state, commands, join/quit, and notifications.
# Proxy: this backend delegates persistent FriendNet state to the proxy and acts as a GUI/client adapter.
Mode: Standalone

# The backend to use: SQLite, MySQL, MariaDB (case-insensitive)
DatabaseType: SQLite

# Interval for coalesced standalone player-data writes.
# In Proxy mode, the proxy should be the authoritative writer instead.
PlayerDataFlushIntervalSeconds: 30

SupportedLocales:
  - en_US
  - de

DefaultLocale: "en_US"

# The settings for MySQL/MariaDB Connection
MySQL:
  host: localhost:3306
  dbName: friendnet
  username: friendnet
  password: friendnet

# The settings for SQLite Connection
SQLite:
  dbName: friendnet
